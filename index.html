<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLUS Writer</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--red:#8A1A24;
--gold:#C6A65B;
}

body{
margin:0;
font-family:Inter;
background:#f2f2f2;
}

/* header */

.header{
background:white;
padding:14px 24px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
}

.logo{
font-family:"Noto Serif SC";
color:var(--red);
letter-spacing:2px;
}

button{
background:var(--red);
color:white;
border:none;
padding:7px 12px;
margin-left:8px;
border-radius:4px;
cursor:pointer;
}

/* layout */

.container{
display:flex;
height:calc(100vh - 60px);
}

.editor{
width:50%;
padding:20px;
background:white;
}

textarea{
width:100%;
height:100%;
border:none;
resize:none;
outline:none;
font-size:15px;
line-height:1.8;
}

.preview{
width:50%;
padding:30px;
overflow:auto;
}

.wechat{
max-width:420px;
margin:auto;
background:white;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* brand */

.brand{
text-align:center;
margin-bottom:25px;
}

.brand h1{
margin:0;
font-family:"Noto Serif SC";
color:var(--red);
}

.brand small{
color:#777;
}

/* title */

.title{
font-size:30px;
font-family:"Noto Serif SC";
margin-top:20px;
}

.subtitle{
color:#666;
margin:6px 0;
}

.meta{
font-size:13px;
color:#999;
}

/* intro */

.intro{
background:#f7f7f7;
border-left:4px solid var(--red);
padding:12px;
margin:20px 0;
}

/* section */

.section{
margin-top:35px;
}

.section-label{
font-size:12px;
letter-spacing:2px;
color:var(--red);
}

.section-title{
font-size:22px;
font-family:"Noto Serif SC";
margin-top:5px;
}

/* h3 */

.h3{
margin-top:20px;
font-weight:600;
}

.h3::before{
content:"✦ ";
color:var(--red);
}

/* text */

p{
line-height:1.8;
margin:15px 0;
}

/* quote */

blockquote{
border-left:3px solid var(--gold);
padding-left:10px;
color:#555;
}

/* strong quote */

.strongquote{
background:var(--red);
color:white;
padding:15px;
margin:20px 0;
border-radius:4px;
}

/* info card */

.card{
background:#f6f6f6;
padding:12px;
border-left:4px solid var(--red);
margin:18px 0;
}

/* image */

.image{
margin:25px 0;
text-align:center;
}

.image img{
width:100%;
border-radius:8px;
}

.caption{
font-size:13px;
color:#888;
margin-top:6px;
}

/* divider */

.divider{
text-align:center;
margin:30px 0;
color:var(--gold);
}

/* summary */

.summary{
background:var(--red);
color:white;
padding:20px;
margin:30px 0;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">POLUS Writer</div>

<div>

<button onclick="insertTemplate()">模板</button>
<button onclick="copyHTML()">复制HTML</button>
<button onclick="clearText()">清空</button>

</div>

</div>

<div class="container">

<div class="editor">

<textarea id="input">

# 社区剧场观察
@ 教育与公共空间
% POLUS Editorial
$ 2025

!! 社区剧场不仅是艺术空间，它也是公共教育的一种形式。

## 社区剧场的参与者

### 谁在参与

社区剧场往往由普通人组成。

> 剧场属于社区。

>>> 戏剧可以成为公共教育。

[] 时间：2025  
[] 地点：深圳  

![戏剧排练]

---

!!! 社区剧场正在成为新的公共学习空间。

</textarea>

</div>

<div class="preview">
<div class="wechat" id="preview"></div>
</div>

</div>

<script>

const input=document.getElementById("input")
const preview=document.getElementById("preview")

let part=1

function render(){

part=1
let lines=input.value.split("\n")

let html=`

<div class="brand">
<h1>POLUS</h1>
<small>Educational Foundation</small>
</div>

`

lines.forEach(line=>{

if(line.startsWith("# "))
html+=`<div class="title">${line.slice(2)}</div>`

else if(line.startsWith("@ "))
html+=`<div class="subtitle">${line.slice(2)}</div>`

else if(line.startsWith("% "))
html+=`<div class="meta">作者：${line.slice(2)}</div>`

else if(line.startsWith("$ "))
html+=`<div class="meta">日期：${line.slice(2)}</div>`

else if(line.startsWith("!! "))
html+=`<div class="intro">${line.slice(3)}</div>`

else if(line.startsWith("## ")){
html+=`

<div class="section">
<div class="section-label">PART ${part}</div>
<div class="section-title">${line.slice(3)}</div>
</div>

`
part++
}

else if(line.startsWith("### "))
html+=`<div class="h3">${line.slice(4)}</div>`

else if(line.startsWith("> "))
html+=`<blockquote>${line.slice(2)}</blockquote>`

else if(line.startsWith(">>> "))
html+=`<div class="strongquote">${line.slice(4)}</div>`

else if(line.startsWith("[] "))
html+=`<div class="card">${line.slice(3)}</div>`

else if(line.startsWith("![")){

let caption=line.substring(2,line.length-1)

html+=`

<div class="image">
<img src="https://picsum.photos/600/400">
<div class="caption">${caption}</div>
</div>

`
}

else if(line.startsWith("---"))
html+=`<div class="divider">◆</div>`

else if(line.startsWith("!!! "))
html+=`<div class="summary">${line.slice(4)}</div>`

else if(line.trim()!="")
html+=`<p>${line}</p>`

})

preview.innerHTML=html

}

input.addEventListener("input",render)

render()

function copyHTML(){
navigator.clipboard.writeText(preview.innerHTML)
alert("公众号HTML已复制")
}

function clearText(){
input.value=""
render()
}

function insertTemplate(){

input.value=`# 标题
@ 副标题
% 作者
$ 日期

!! 导语

## 第一部分

### 小标题

正文

> 引用

>>> 重点观点

[] 信息卡

![图片说明]

---

!!! 总结
`

render()

}

</script>

</body>

</html>
