<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLUS 内容编辑器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f0f2;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            background: #ffffff;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .logo {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            color: #8A1A24;
            letter-spacing: 1px;
        }

        .btn-copy {
            background: #8A1A24;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background: #a3202b;
        }

        /* 主体容器 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 编辑区 */
        .editor-container {
            flex: 1;
            padding: 20px;
            background: #fff;
            border-right: 1px solid #eee;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 预览区 */
        .preview-container {
            flex: 1;
            padding: 40px 20px;
            overflow-y: auto;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
        }

        /* 模拟微信公众号宽度 */
        #article-wrapper {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px 30px;
            min-height: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* 语法提示面板 */
        .syntax-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid #ddd;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="logo">POLUS EDITOR</div>
    <button class="btn-copy" onclick="copyToWechat()">复制到公众号</button>
</div>

<div class="main-container">
    <div class="editor-container">
<textarea id="editor" placeholder="在此输入内容...">
# 赋能教育新未来
@ POLUS 执行团队 / 2026年3月

!! 这是一个基于 POLUS 视觉规范的在线编辑器。支持自动章节编号、高档衬线体排版，以及针对微信公众号后台的一键样式克隆。

## 核心愿景
POLUS 致力于通过创新的教育模式，为每一个孩子提供公平且高质量的学习机会。我们的项目涵盖了从乡村教育支持到城市素质教育拓展的全方位服务。

[] 重点项目：2026年“星火计划”已正式启动，预计覆盖全国15个省份。

## 协作与创新
![POLUS活动](https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=800&q=80)
排版中不仅注重文字的传递，更注重视觉的留白与节奏。

## 总结感言
坚持以人为本，用科技与温情重塑学习的边界。</textarea>
    </div>

    <div class="preview-container">
        <div id="article-wrapper">
            </div>
    </div>
</div>

<div class="syntax-hint">
    <b>语法：</b><br>
    # 主标题 | @ 副标题 | !! 导语<br>
    ## 章节标题 | [] 卡片 | ![描述](URL) 图片
</div>

<script>
    const editor = document.getElementById('editor');
    const wrapper = document.getElementById('article-wrapper');

    function render() {
        const text = editor.value;
        const lines = text.split('\n');
        let html = '';
        let sectionCount = 0;

        // 品牌头部
        const header = `
            <div style="text-align: center; margin-bottom: 50px;">
                <div style="font-size: 32px; font-weight: bold; color: #8A1A24; letter-spacing: 6px; font-family: 'Optima', serif;">POLUS</div>
                <div style="font-size: 10px; color: #B8860B; letter-spacing: 2px; margin-top: 5px; font-weight: bold;">EDUCATIONAL FOUNDATION</div>
                <div style="width: 20px; height: 1px; background: #8A1A24; margin: 15px auto;"></div>
            </div>
        `;

        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed) return;

            // 主标题
            if (trimmed.startsWith('# ')) {
                html += `<h1 style="font-size: 26px; color: #222; text-align: center; margin: 30px 0 10px; font-family: 'Noto Serif SC', serif;">${trimmed.replace('# ', '')}</h1>`;
            }
            // 副标题
            else if (trimmed.startsWith('@ ')) {
                html += `<div style="font-size: 13px; color: #888; text-align: center; margin-bottom: 30px; letter-spacing: 1px;">${trimmed.replace('@ ', '')}</div>`;
            }
            // 导语
            else if (trimmed.startsWith('!! ')) {
                html += `<div style="background: #fdf5f6; border-left: 4px solid #8A1A24; padding: 20px; margin: 25px 0; color: #8A1A24; line-height: 1.8; font-size: 15px; font-weight: 500;">${trimmed.replace('!! ', '')}</div>`;
            }
            // 章节标题 (带自动编号)
            else if (trimmed.startsWith('## ')) {
                sectionCount++;
                const num = sectionCount < 10 ? '0' + sectionCount : sectionCount;
                html += `
                    <div style="margin: 45px 0 25px;">
                        <div style="font-size: 12px; color: #8A1A24; font-weight: bold; letter-spacing: 2px; opacity: 0.7;">POLUS SECTION ${num}</div>
                        <div style="width: 35px; height: 3px; background: #B8860B; margin: 10px 0;"></div>
                        <h2 style="font-size: 22px; color: #222; margin: 0; font-family: 'Noto Serif SC', serif;">${trimmed.replace('## ', '')}</h2>
                    </div>`;
            }
            // 引用卡片
            else if (trimmed.startsWith('[] ')) {
                html += `<div style="background: #f9f9f9; border: 1px solid #eee; border-top: 3px solid #8A1A24; padding: 20px; margin: 25px 0; font-size: 15px; color: #444; line-height: 1.8; text-align: justify;">${trimmed.replace('[] ', '')}</div>`;
            }
            // 图片
            else if (trimmed.startsWith('![')) {
                const urlMatch = trimmed.match(/\((.*?)\)/);
                if (urlMatch) {
                    html += `<img src="${urlMatch[1]}" style="width: 100%; display: block; border-radius: 2px; margin: 25px 0;">`;
                }
            }
            // 分隔线
            else if (trimmed === '---') {
                html += `<div style="text-align: center; color: #B8860B; margin: 40px 0;">◆ ◆ ◆</div>`;
            }
            // 普通段落
            else {
                html += `<p style="font-size: 16px; line-height: 1.9; color: #333; margin: 1.5em 0; text-align: justify; font-family: 'Optima', 'Noto Serif SC', serif;">${trimmed}</p>`;
            }
        });

        wrapper.innerHTML = header + html;
    }

    // 监听输入
    editor.addEventListener('input', render);

    // 初始渲染
    render();

    // 复制富文本功能
    async function copyToWechat() {
        const type = "text/html";
        // 关键点：获取渲染后的 HTML，并包裹在特定的 div 中以确保样式携带
        const blob = new Blob([wrapper.outerHTML], { type });
        const data = [new ClipboardItem({ [type]: blob })];

        try {
            await navigator.clipboard.write(data);
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = "✅ 复制成功！";
            btn.style.background = "#28a745";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#8A1A24";
            }, 2000);
        } catch (err) {
            alert("复制失败，请尝试手动全选预览区并复制。");
        }
    }
</script>

</body>
</html>
