<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLUS Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{

--polus-red:#8A1A24;
--polus-gold:#B8860B;

}

body{
margin:0;
font-family:Inter,sans-serif;
background:#F4F4F4;
}

/* header */

.header{

background:white;
padding:14px 30px;
border-bottom:1px solid #eee;

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

font-family:"Noto Serif SC",serif;
color:var(--polus-red);
letter-spacing:2px;
font-size:18px;

}

.toolbar button{

margin-left:10px;
background:var(--polus-red);
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;

}

/* layout */

.container{

display:flex;
height:calc(100vh - 60px);

}

.editor{

width:50%;
padding:25px;
background:white;
border-right:1px solid #eee;

}

textarea{

width:100%;
height:100%;
border:none;
outline:none;
resize:none;

font-size:15px;
line-height:1.8;

}

.preview{

width:50%;
padding:30px;
overflow:auto;

}

.wechat{

max-width:420px;
margin:auto;
background:white;
padding:35px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

}

/* brand */

.brand{

text-align:center;
margin-bottom:30px;

}

.brand h1{

margin:0;

font-family:"Noto Serif SC",serif;
color:var(--polus-red);

letter-spacing:2px;

}

.brand small{

color:#777;

}

/* title */

.title{

font-family:"Noto Serif SC",serif;
font-size:28px;
font-weight:700;

margin:20px 0 10px;

}

.h1-marker{

display:inline-block;
padding:4px 10px;
border:1px solid rgba(138,26,36,0.2);
border-radius:999px;
font-size:11px;
letter-spacing:2px;
color:var(--polus-red);
margin-bottom:12px;

}

.subtitle{

color:#666;

margin-bottom:10px;

}

.meta{

color:#999;
font-size:13px;
margin-bottom:20px;

}

/* intro */

.intro{

border-left:4px solid var(--polus-red);
background:#FAFAFA;

padding:14px;

margin:20px 0;

}

/* insight */

.insight{

margin-top:30px;

}

.insight-label{

font-size:12px;

color:var(--polus-red);
letter-spacing:2px;

font-weight:600;

}

.insight-line{

height:2px;
width:60px;

background:var(--polus-gold);

margin:6px 0;

}

.insight-title{

font-family:"Noto Serif SC",serif;
font-size:20px;

margin-bottom:10px;

}

.section-subtitle{

font-family:"Noto Serif SC",serif;
font-size:17px;
font-weight:700;
margin:18px 0 8px;
padding-left:10px;
border-left:2px solid rgba(184,134,11,0.7);
color:#3b3b3b;

}

/* text */

p{

line-height:1.8;
color:#333;

margin:15px 0;

}

/* quote */

blockquote{

border-left:3px solid var(--polus-gold);

padding-left:12px;

margin:18px 0;

color:#555;

}

.golden-quote{

margin:22px 0;
padding:16px 18px;
background:linear-gradient(90deg,rgba(184,134,11,0.12),rgba(184,134,11,0));
border-left:4px solid var(--polus-gold);
font-family:"Noto Serif SC",serif;
font-size:18px;
line-height:1.7;
color:#4a3a16;

}

.golden-quote::before{

content:"✦ 金句";
display:block;
font-size:12px;
letter-spacing:2px;
font-family:Inter,sans-serif;
color:var(--polus-gold);
margin-bottom:8px;

}

/* divider */

.divider{

text-align:center;
margin:30px 0;

}

.divider span{

color:var(--polus-gold);
font-size:14px;

}

/* image */

.image{

text-align:center;

margin:25px 0;

}

.image img{

width:100%;
border-radius:6px;

}

.caption{

font-size:13px;
color:#888;

margin-top:6px;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
POLUS Editor
</div>

<div class="toolbar">

<button onclick="insertTemplate()">插入模板</button>

<button onclick="copyHTML()">复制HTML</button>

<button onclick="clearText()">清空</button>

</div>

</div>

<div class="container">

<div class="editor">

<textarea id="input">

# 谁扫银杏叶
@ 社区剧场观察
% POLUS Editorial
$ 2025

!! 在社区剧场的空间里，舞台不只是表演的地方，它也成为公共讨论的现场。

## 谁在清扫落叶

### 日常分工里的舞台政治

社区剧场往往由普通人组成，他们既是观众，也是参与者。

>> 每一次扫落叶，都是一次对“谁有权发声”的重写。

> 剧场并不只属于演员，它属于整个社区。

---

## 社区与舞台

### 从观看到共同治理

当社区进入舞台，艺术也重新回到生活。

![社区剧照]

</textarea>

</div>

<div class="preview">

<div class="wechat" id="preview"></div>

</div>

</div>

<script>

const input=document.getElementById("input")
const preview=document.getElementById("preview")

function render(){

const lines=input.value.split("\n")

let html=`

<div class="brand">

<h1>POLUS</h1>

<small>Educational Foundation</small>

</div>

`

lines.forEach(line=>{

if(line.startsWith("# ")){

html+=`
<div class="h1-marker">一级标题</div>
<div class="title">${line.slice(2)}</div>
`

}

else if(line.startsWith("@ ")){

html+=`<div class="subtitle">${line.slice(2)}</div>`

}

else if(line.startsWith("% ")){

html+=`<div class="meta">作者：${line.slice(2)}</div>`

}

else if(line.startsWith("$ ")){

html+=`<div class="meta">日期：${line.slice(2)}</div>`

}

else if(line.startsWith("!! ")){

html+=`<div class="intro">${line.slice(3)}</div>`

}

else if(line.startsWith("## ")){

html+=`

<div class="insight">

<div class="insight-label">

POLUS INSIGHT

</div>

<div class="insight-line"></div>

<div class="insight-title">

${line.slice(3)}

</div>

</div>

`

}

else if(line.startsWith("### ")){

html+=`<div class="section-subtitle">${line.slice(4)}</div>`

}

else if(line.startsWith(">> ")){

html+=`<div class="golden-quote">${line.slice(3)}</div>`

}

else if(line.startsWith("> ")){

html+=`<blockquote>${line.slice(2)}</blockquote>`

}

else if(line.startsWith("---")){

html+=`<div class="divider"><span>◆</span></div>`

}

else if(line.startsWith("![")){

let caption=line.substring(2,line.length-1)

html+=`

<div class="image">

<img src="https://picsum.photos/600/400">

<div class="caption">${caption}</div>

</div>

`

}

else if(line.trim()!=""){

html+=`<p>${line}</p>`

}

})

preview.innerHTML=html

}

input.addEventListener("input",render)

render()

function copyHTML(){

navigator.clipboard.writeText(preview.innerHTML)

alert("公众号HTML已复制")

}

function clearText(){

input.value=""

render()

}

function insertTemplate(){

input.value=`# 标题
@ 副标题
% 作者
$ 日期

!! 导语

## 第一部分

### 小标题

正文

>> 金句

> 引用

---

## 第二部分

正文

![图片说明]
`

render()

}

</script>

</body>

</html>
