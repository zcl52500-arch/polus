<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLUS Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--polus-red:#8A1A24;
--polus-gold:#B8860B;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:#f6f4f2;
}

.header{
background:white;
border-bottom:1px solid #eee;
padding:12px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-family:"Noto Serif SC",serif;
color:var(--polus-red);
font-size:18px;
letter-spacing:2px;
}

.toolbar button{
margin-left:10px;
background:var(--polus-red);
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:4px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.editor{
width:50%;
padding:25px;
background:white;
border-right:1px solid #eee;
}

textarea{
width:100%;
height:100%;
border:none;
outline:none;
font-size:15px;
line-height:1.8;
resize:none;
}

.preview{
width:50%;
padding:30px;
overflow:auto;
}

.wechat{
max-width:420px;
margin:auto;
background:white;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* brand */

.brand{
text-align:center;
margin-bottom:30px;
}

.brand h1{
margin:0;
font-family:"Noto Serif SC",serif;
color:var(--polus-red);
letter-spacing:2px;
}

.brand small{
color:#777;
}

/* title */

.title{
font-family:"Noto Serif SC",serif;
font-size:28px;
font-weight:700;
margin:20px 0 10px;
}

.subtitle{
color:#666;
margin-bottom:10px;
}

.meta{
color:#999;
font-size:13px;
margin-bottom:20px;
}

/* intro */

.intro{
border-left:4px solid var(--polus-red);
background:#fafafa;
padding:14px;
margin:20px 0;
}

/* insight */

.insight{
margin-top:30px;
}

.insight-label{
font-size:12px;
color:var(--polus-red);
letter-spacing:2px;
font-weight:600;
}

.insight-line{
height:2px;
width:60px;
background:var(--polus-gold);
margin:6px 0;
}

.insight-title{
font-family:"Noto Serif SC",serif;
font-size:20px;
margin-bottom:10px;
}

/* text */

p{
line-height:1.8;
color:#333;
}

/* quote */

blockquote{
border-left:3px solid var(--polus-gold);
padding-left:12px;
margin:18px 0;
color:#555;
}

/* divider */

.divider{
text-align:center;
margin:25px 0;
}

.divider span{
display:inline-block;
width:60px;
height:2px;
background:var(--polus-gold);
}

/* image */

.image{
margin:25px 0;
text-align:center;
}

.image img{
width:100%;
border-radius:6px;
}

.caption{
font-size:13px;
color:#888;
margin-top:6px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
POLUS Editor
</div>

<div class="toolbar">

<button onclick="insertTemplate()">插入模板</button>

<button onclick="copyHTML()">复制HTML</button>

<button onclick="clearText()">清空</button>

</div>

</div>

<div class="container">

<div class="editor">

<textarea id="input">

# 谁扫银杏叶
@ 社区剧场观察
% POLUS Editorial
$ 2025

!! 在社区剧场的空间里，舞台不只是表演的地方，它也成为公共讨论的现场。

## 谁在清扫落叶？

社区剧场往往由普通人组成，他们既是观众，也是参与者。

> 剧场并不只属于演员，它属于整个社区。

---

## 社区与舞台

当社区进入舞台，艺术也重新回到生活。

![剧照]

</textarea>

</div>

<div class="preview">

<div class="wechat" id="preview"></div>

</div>

</div>

<script>

const input=document.getElementById("input")
const preview=document.getElementById("preview")

function render(){

const lines=input.value.split("\n")

let html=`
<div class="brand">
<h1>POLUS</h1>
<small>Educational Foundation</small>
</div>
`

lines.forEach(line=>{

if(line.startsWith("# ")){

html+=`<div class="title">${line.slice(2)}</div>`

}

else if(line.startsWith("@ ")){

html+=`<div class="subtitle">${line.slice(2)}</div>`

}

else if(line.startsWith("% ")){

html+=`<div class="meta">作者：${line.slice(2)}</div>`

}

else if(line.startsWith("$ ")){

html+=`<div class="meta">日期：${line.slice(2)}</div>`

}

else if(line.startsWith("!! ")){

html+=`<div class="intro">${line.slice(3)}</div>`

}

else if(line.startsWith("## ")){

html+=`

<div class="insight">

<div class="insight-label">
POLUS INSIGHT
</div>

<div class="insight-line"></div>

<div class="insight-title">
${line.slice(3)}
</div>

</div>

`

}

else if(line.startsWith("> ")){

html+=`<blockquote>${line.slice(2)}</blockquote>`

}

else if(line.startsWith("---")){

html+=`<div class="divider"><span></span></div>`

}

else if(line.startsWith("![")){

let caption=line.substring(2,line.length-1)

html+=`

<div class="image">

<img src="https://picsum.photos/600/400">

<div class="caption">${caption}</div>

</div>

`

}

else if(line.trim()!=""){

html+=`<p>${line}</p>`

}

})

preview.innerHTML=html

}

input.addEventListener("input",render)

render()

function copyHTML(){

navigator.clipboard.writeText(preview.innerHTML)

alert("公众号HTML已复制")

}

function clearText(){

input.value=""

render()

}

function insertTemplate(){

input.value=`# 标题
@ 副标题
% 作者
$ 日期

!! 导语

## 第一部分

正文

---

## 第二部分

正文
`

render()

}

</script>

</body>
</html>
